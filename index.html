<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spike Timer</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
        font-family: monospace, monospace;
        cursor: pointer;
        transition: background-color 0.2s;
        user-select: none;
        overflow: hidden;
        -webkit-tap-highlight-color: blue;
    }
    
    #circle {
        width: 300px;
        height: 300px;
        border: 4px solid white;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 5rem;
        font-weight: ;
        color: white;
        background-color: transparent;
        transition: background-color 0.2s, border-color 0.2s, color 0.2s;
    }
</style>
</head>
<body>

<div id="circle">SPIKE</div>

<script>
    const body = document.body;
    const circle = document.getElementById('circle');
    let timer = null;
    let isRunning = false;

    function resetTimer() {
        clearInterval(timer);
        isRunning = false;
        circle.textContent = 'SPIKE';
        body.style.backgroundColor = 'black';
        circle.style.backgroundColor = 'transparent';
        circle.style.borderColor = 'white';
        circle.style.color = 'white';
    }

    function updateState(timeLeft) {
        circle.textContent = timeLeft;

        if (timeLeft >= 31 && timeLeft <= 45) {
            body.style.backgroundColor = 'black';
            circle.style.backgroundColor = 'transparent';
            circle.style.borderColor = 'white';
            circle.style.color = 'white';
        } else if (timeLeft >= 21 && timeLeft <= 30) {
            body.style.backgroundColor = 'black';
            circle.style.backgroundColor = 'white';
            circle.style.borderColor = 'white';
            circle.style.color = 'black';
        } else if (timeLeft >= 11 && timeLeft <= 20) {
            body.style.backgroundColor = 'black';
            circle.style.backgroundColor = 'yellow';
            circle.style.borderColor = 'yellow';
            circle.style.color = 'black';
        } else if (timeLeft >= 7 && timeLeft <= 10) {
            body.style.backgroundColor = 'black';
            circle.style.backgroundColor = 'orange';
            circle.style.borderColor = 'orange';
            circle.style.color = 'black';
        } else if (timeLeft >= 0 && timeLeft <= 6) {
            body.style.backgroundColor = 'black';
            circle.style.backgroundColor = 'red';
            circle.style.borderColor = 'red';
            circle.style.color = 'white';
        }
    }

    body.addEventListener('click', () => {
        if (isRunning) return;
        isRunning = true;
        let timeLeft = 45;
        updateState(timeLeft);

        timer = setInterval(() => {
            timeLeft--;
            if (timeLeft < 0) {
                resetTimer();
            } else {
                updateState(timeLeft);
            }
        }, 1000);
    });
</script>

</body>
</html>
